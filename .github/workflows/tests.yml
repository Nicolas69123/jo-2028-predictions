name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install pandas numpy joblib scikit-learn pytest

      - name: Run pytest
        # Les artefacts du pipeline (data/processed, models) sont gitignores :
        # les tests correspondants sont skippes automatiquement en CI.
        run: python -m pytest tests/ -v
